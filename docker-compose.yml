version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pms-backend
    restart: unless-stopped
    environment:
      # Use Supabase URL from environment
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres.user:password@aws-0-region.pooler.supabase.com:6543/postgres}
      DIRECT_URL: ${DIRECT_URL:-postgresql://postgres.user:password@aws-0-region.pooler.supabase.com:5432/postgres}
      JWT_SECRET: pms-docker-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    ports:
      - '5000:5000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: pms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:80'
